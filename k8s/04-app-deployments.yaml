apiVersion: apps/v1
kind: Deployment
metadata:
  name: app1
  namespace: messaging-pipeline
spec:
  replicas: 1
  selector:
    matchLabels:
      app: worker
      component: app1
  template:
    metadata:
      labels:
        app: worker
        component: app1
    spec:
      containers:
        - name: app
          image: messaging-app:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: APP_NAME
              value: "App1"
            - name: INPUT_SUBJECT
              value: "app1.input"
            - name: OUTPUT_SUBJECT
              value: "app2.input"
            - name: NATS_SERVERS
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: NATS_SERVERS
